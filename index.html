<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sarai Flores — Portfolio of Willowmere</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --green-deep: #0A1F14;
    --green-mid: #1A4A2E;
    --cream: #F7F2E3;
    --brown: #2C1A0E;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--brown);
    overflow: hidden;
    font-family: 'IM Fell English', serif;
  }

  /* BACKGROUND */
  #bg {
    position: fixed; inset: 0;
    background-image: url('Background.png');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(10, 8, 4, 0.35);
  }

  /* SPARKLES */
  .sparkle {
    position: fixed;
    width: 3px; height: 3px;
    background: var(--gold-light);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: twinkle var(--dur, 3s) ease-in-out infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  /* BOOK WRAPPER */
  #book-wrapper {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    padding: 20px;
  }

  /* BOOK */
  #book {
    position: relative;
    width: min(1100px, 95vw);
    aspect-ratio: 16/9;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
  }

  /* PAGES */
  .page {
    position: absolute; inset: 0;
    border-radius: 4px 12px 12px 4px;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateX(30px);
  }
  .page.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .page.exit-left {
    opacity: 0;
    transform: translateX(-30px);
    pointer-events: none;
  }
  .page img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* CLOSING PAGE - portrait orientation special handling */
  .page.closing img {
    object-fit: contain;
    background: #0d1a0f;
  }

  /* NAV ARROWS */
  .nav-arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    background: rgba(10, 31, 20, 0.75);
    border: 1px solid rgba(201, 168, 76, 0.4);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    width: 48px; height: 48px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }
  .nav-arrow:hover {
    background: rgba(201, 168, 76, 0.2);
    border-color: var(--gold);
    transform: translateY(-50%) scale(1.1);
  }
  .nav-arrow:disabled {
    opacity: 0.3;
    cursor: default;
    transform: translateY(-50%);
  }
  #prev { left: 12px; }
  #next { right: 12px; }

  /* PAGE DOTS */
  #dots {
    position: fixed;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    z-index: 100;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.3);
    border: 1px solid rgba(201, 168, 76, 0.5);
    cursor: pointer;
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--gold);
    transform: scale(1.3);
  }

  /* PAGE LABEL */
  #page-label {
    position: fixed;
    bottom: 40px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    color: rgba(201, 168, 76, 0.6);
    text-transform: uppercase;
    z-index: 100;
    white-space: nowrap;
  }

  /* STICKERS */
  .sticker {
    position: fixed;
    cursor: grab;
    user-select: none;
    z-index: 200;
    font-size: 1.8rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.2s;
  }
  .sticker:hover { transform: scale(1.2) rotate(5deg); }
  .sticker:active { cursor: grabbing; }

  /* MOBILE */
  @media (max-width: 700px) {
    #book {
      aspect-ratio: 9/16;
      width: min(380px, 95vw);
    }
    .page img { object-fit: cover; object-position: left center; }
    #prev { left: 4px; }
    #next { right: 4px; }
    .nav-arrow { width: 38px; height: 38px; font-size: 1rem; }
  }

  /* KEYBOARD HINT */
  #hint {
    position: fixed;
    top: 16px; right: 16px;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: rgba(201, 168, 76, 0.4);
    z-index: 100;
  }
</style>
</head>
<body>

<div id="bg"></div>

<!-- Sparkles -->
<div id="sparkles"></div>

<!-- Book -->
<div id="book-wrapper">
  <div id="book">

    <div class="page active" id="p0">
      <img src="Cover.png" alt="Portfolio Cover — Sarai Flores">
    </div>

    <div class="page" id="p1">
      <img src="Grimoire.png" alt="Grimoire — Who I Am">
    </div>

    <div class="page" id="p2">
      <img src="Teyolia.png" alt="Teyolia — My Biggest Project">
    </div>

    <div class="page" id="p3">
      <img src="Automations.png" alt="Automations — 5 Spells I Cast Independently">
    </div>

    <div class="page" id="p4">
      <img src="Journey.png" alt="Journey — It's Been Quite the Adventure">
    </div>

    <div class="page" id="p5">
      <img src="Contact.png" alt="Don't Be Shy — Let's Connect">
    </div>

    <div class="page closing" id="p6">
      <img src="Closing.png" alt="The End — Thank You for Visiting Willowmere">
    </div>

  </div>
</div>

<!-- Navigation -->
<button class="nav-arrow" id="prev" onclick="changePage(-1)" disabled>‹</button>
<button class="nav-arrow" id="next" onclick="changePage(1)">›</button>

<!-- Dots -->
<div id="dots"></div>

<!-- Page label -->
<div id="page-label"></div>

<!-- Keyboard hint -->
<div id="hint">← → to navigate · drag stickers</div>

<!-- Movable Stickers -->
<div class="sticker" id="s1" style="left:6%;top:15%;">✨</div>
<div class="sticker" id="s2" style="left:8%;top:75%;">🍵</div>
<div class="sticker" id="s3" style="right:7%;top:20%;">🌿</div>
<div class="sticker" id="s4" style="right:6%;top:70%;">⭐</div>
<div class="sticker" id="s5" style="left:5%;top:45%;">🕯️</div>
<div class="sticker" id="s6" style="right:8%;top:45%;">📚</div>
<div class="sticker" id="s7" style="left:15%;top:88%;">🌸</div>
<div class="sticker" id="s8" style="right:15%;top:88%;">🍂</div>
<div class="sticker" id="s9" style="left:20%;top:8%;">🌙</div>
<div class="sticker" id="s10" style="right:20%;top:8%;">🪶</div>

<script>
  const pages = document.querySelectorAll('.page');
  const labels = ['Cover', 'Grimoire', 'Teyolia', 'Automations', 'Journey', 'Contact', 'The End'];
  let current = 0;
  let animating = false;

  // Build dots
  const dotsEl = document.getElementById('dots');
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });

  function updateUI() {
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
    document.getElementById('prev').disabled = current === 0;
    document.getElementById('next').disabled = current === pages.length - 1;
    document.getElementById('page-label').textContent = labels[current];
  }

  function goTo(n) {
    if (animating || n === current || n < 0 || n >= pages.length) return;
    animating = true;
    const dir = n > current ? 1 : -1;
    pages[current].classList.remove('active');
    pages[current].classList.add(dir > 0 ? 'exit-left' : '');
    current = n;
    pages[current].classList.remove('exit-left');
    pages[current].classList.add('active');
    updateUI();
    setTimeout(() => {
      pages.forEach(p => { if (!p.classList.contains('active')) p.classList.remove('exit-left'); });
      animating = false;
    }, 650);
  }

  function changePage(dir) { goTo(current + dir); }

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changePage(1);
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') changePage(-1);
  });

  // Touch/swipe
  let touchX = 0;
  document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
  document.addEventListener('touchend', e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) changePage(diff > 0 ? 1 : -1);
  });

  updateUI();

  // Sparkles
  const sparkleContainer = document.getElementById('sparkles');
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
    s.style.setProperty('--delay', (Math.random() * 4) + 's');
    sparkleContainer.appendChild(s);
  }

  // Draggable stickers
  document.querySelectorAll('.sticker').forEach(sticker => {
    let dragging = false, ox = 0, oy = 0;

    sticker.addEventListener('mousedown', e => {
      dragging = true;
      const r = sticker.getBoundingClientRect();
      ox = e.clientX - r.left;
      oy = e.clientY - r.top;
      sticker.style.transition = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      sticker.style.left = (e.clientX - ox) + 'px';
      sticker.style.top = (e.clientY - oy) + 'px';
      sticker.style.right = 'auto';
    });

    document.addEventListener('mouseup', () => {
      dragging = false;
      sticker.style.transition = 'transform 0.2s';
    });

    // Touch drag
    sticker.addEventListener('touchstart', e => {
      dragging = true;
      const r = sticker.getBoundingClientRect();
      ox = e.touches[0].clientX - r.left;
      oy = e.touches[0].clientY - r.top;
      e.preventDefault();
    }, { passive: false });

    sticker.addEventListener('touchmove', e => {
      if (!dragging) return;
      sticker.style.left = (e.touches[0].clientX - ox) + 'px';
      sticker.style.top = (e.touches[0].clientY - oy) + 'px';
      sticker.style.right = 'auto';
      e.preventDefault();
    }, { passive: false });

    sticker.addEventListener('touchend', () => dragging = false);
  });
</script>
</body>
</html>
